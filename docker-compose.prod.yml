name: kitchen-portfolio-prod

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - kitchen_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [kitchen]

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.prod.Dockerfile
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      PHOTOS_DIR: /photos
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./photos:/photos:ro
    depends_on:
      db:
        condition: service_healthy
    expose: ["8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS}"
    networks: [kitchen]

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.prod.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_PHOTOS_BASE_URL: ${VITE_PHOTOS_BASE_URL}
        VITE_SITE_NAME: ${VITE_SITE_NAME}
        VITE_SITE_DESCRIPTION: ${VITE_SITE_DESCRIPTION}
    restart: always
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks: [kitchen]

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "${CADDY_HTTP_PORT}:80"
      - "${CADDY_HTTPS_PORT}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./photos:/srv/photos:ro
      - frontend_dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks: [kitchen]

volumes:
  kitchen_db_data:
  frontend_dist:
  caddy_data:
  caddy_config:

networks:
  kitchen:
    driver: bridge

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: Cormorant Garamond (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- SEO + OG -->
    <title>Atelier Kitchens — Bespoke Custom Cabinetry</title>
    <meta
      name="description"
      content="Atelier Kitchens designs and builds bespoke custom kitchen cabinets and heirloom furniture for the Pacific Northwest's most discerning homes."
    />
    <meta name="author" content="Atelier Kitchens" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Atelier Kitchens — Bespoke Custom Cabinetry" />
    <meta
      property="og:description"
      content="Heirloom cabinetry, made by hand. View our portfolio of custom kitchens."
    />
    <meta property="og:site_name" content="Atelier Kitchens" />
    <meta property="og:image" content="/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Atelier Kitchens" />
    <meta name="twitter:description" content="Bespoke custom kitchen cabinets, made to last." />

    <!-- Inline theme priming to avoid FOUC -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("kp-theme") || "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = t === "dark" || (t === "system" && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
